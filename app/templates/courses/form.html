{% extends 'base.html' %}

{% block title %}{{ 'Sửa' if course else 'Thêm' }} Học phần{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4>
                    <i class="bi bi-{{ 'pencil' if course else 'plus-circle' }}"></i>
                    {{ 'Sửa học phần' if course else 'Thêm học phần mới' }}
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="course_code" class="form-label">Mã học phần <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="course_code" name="course_code"
                               value="{{ course.course_code if course else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="name" class="form-label">Tên học phần <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name"
                               value="{{ course.name if course else '' }}" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="credits" class="form-label">Số tín chỉ</label>
                            <input type="number" class="form-control" id="credits" name="credits"
                                   value="{{ course.credits if course else 3 }}" min="1" max="20">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="category" class="form-label">Loại</label>
                            <input type="text" class="form-control" id="category" name="category"
                                   value="{{ course.category if course else '' }}"
                                   placeholder="VD: Đại cương, Cơ sở ngành, Chuyên ngành...">
                        </div>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="is_required" name="is_required"
                               {{ 'checked' if (course and course.is_required) or not course }}>
                        <label class="form-check-label" for="is_required">Bắt buộc</label>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Mô tả</label>
                        <textarea class="form-control" id="description" name="description" rows="3">{{ course.description if course else '' }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> {{ 'Cập nhật' if course else 'Tạo mới' }}
                        </button>
                        <a href="{{ url_for('courses.list_courses') }}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Quay lại
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
