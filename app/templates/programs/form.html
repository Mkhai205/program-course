{% extends 'base.html' %} {% block title %}{{ 'Sửa' if program else 'Thêm' }} Chương trình{%
endblock %} {% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4>
                    <i class="bi bi-{{ 'pencil' if program else 'plus-circle' }}"></i>
                    {{ 'Sửa chương trình' if program else 'Thêm chương trình mới' }}
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="program_code" class="form-label"
                            >Mã chương trình <span class="text-danger">*</span></label
                        >
                        <input
                            type="text"
                            class="form-control"
                            id="program_code"
                            name="program_code"
                            value="{{ program.program_code if program else '' }}"
                            required
                        />
                    </div>
                    <div class="mb-3">
                        <label for="name" class="form-label"
                            >Tên chương trình <span class="text-danger">*</span></label
                        >
                        <input
                            type="text"
                            class="form-control"
                            id="name"
                            name="name"
                            value="{{ program.name if program else '' }}"
                            required
                        />
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Mô tả</label>
                        <textarea class="form-control" id="description" name="description" rows="4">
{{ program.description if program else '' }}</textarea
                        >
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> {{ 'Cập nhật' if program else 'Tạo
                            mới' }}
                        </button>
                        <a href="{{ url_for('programs.index') }}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Quay lại
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
