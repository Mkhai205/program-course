version: "3.8"

services:
    db:
        image: postgres:15
        environment:
            POSTGRES_DB: program_course_db
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: admin123
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data

    web:
        build: .
        ports:
            - "5000:5000"
        environment:
            DATABASE_URL: postgresql+psycopg://admin:admin123@db:5432/program_course_db
            FLASK_ENV: development
            SECRET_KEY: supersecretkey123
        depends_on:
            - db
        volumes:
            - .:/app

volumes:
    pgdata:
